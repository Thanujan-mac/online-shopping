<!DOCTYPE html>

<head>
    <title>Shayz Choice Sign In</title>
    <link rel="icon" href="img/shayz img.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <link rel="stylesheet" href="signup.css">
    <center>
        <h1 class="name" color="white">Shayz Choice 🛒<h1>
    </center>

    <center>
    <div class="round">
        <div class="container">
            <h1 class="login">Sign Up</h1>
        </div>
        <div class="social-container">
            <a href="@@@@@@@@@@@@@" class="icon" target="_blank">
            <i class="fa-brands fa-google"></i>
            </a>
            <a href="@@@@@@@@@@@@@" class="icon" target="_blank">
            <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="@@@@@@@@@@@@@" class="icon" target="_blank">
            <i class="fa-brands fa-instagram"></i>
            </a>
        </div>

        <div class="first-name">
            <input type="text" placeholder="First Name" size="30">
        </div>

        <br>

        <div class="last-name">
            <input type="text" placeholder="Last Name" size="30">
        </div>

        <br>

        <div class="phone">
            <input type="text" placeholder="+94 XX XXX XXXX" size="30">
        </div>

        <br>

        <div class="input-mail">
            <input type="email" placeholder="E-Mail" size="30">
        </div>

        <br>

        <div class="create-pass">
            <input type="password" type="hidden" placeholder="Create Password" size="30">
        </div>

        <br>

        <div class="confirm-pass">
            <input type="password" type="hidden" placeholder="Confirm Password" size="30">
        </div>

        <br>

        <div class="signin-btn">
            <a href="#######"><button class="in-btn">Sign Up</button></a>
        </div>

        <br>
        
        <div class="sign-in">
            if you have account Already : <a href="signin.html"><button class="up-btn">Sign In</button></a>
        </div>

    </div>
    </center>
</body>
</html>
